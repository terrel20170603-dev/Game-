<!DOCTYPE html>
<html>
    <head>
        <title>Hey Ground</title>
        <style>
            #container {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            #canvas-wrapper {
                overflow: auto;
                max-width: 80vw;
                max-height: 75vh;
                border: 1px solid #333;
                cursor: grab;
            }
            #canvas-wrapper:active {
                cursor: grabbing;
            }
            #canvas {
                display: block;
            }
            .btn {
                margin-left: 12px;
                margin-bottom: 8px;
                padding: 8px 16px;
                font-size: 14px;
                cursor: pointer;
                color: #fff;
                border: none;
                border-radius: 4px;
                display: block;
            }
            #btn-path {
                background: #4a90d9;
            }
            #btn-path:hover {
                background: #357abd;
            }
            #btn-reset {
                background: #e07b3c;
            }
            #btn-reset:hover {
                background: #c06830;
            }
            .difficulty-bar {
                margin-left: 12px;
                display: flex;
                flex-direction: column;
                gap: 3px;
            }
            .diff-btn {
                padding: 4px 10px;
                font-size: 12px;
                cursor: pointer;
                color: #fff;
                border: none;
                border-radius: 4px;
                background: #777;
            }
            .diff-btn.active {
                background: #2ca84e;
            }
            .diff-btn.locked {
                background: #444;
                opacity: 0.35;
                cursor: not-allowed;
            }
            .diff-btn:hover {
                opacity: 0.8;
            }
            .diff-btn.locked:hover {
                opacity: 0.35;
            }
            #btn-unlock {
                background: #c0392b;
                margin-left: 12px;
                margin-bottom: 4px;
                padding: 5px 12px;
                font-size: 12px;
                cursor: pointer;
                color: #fff;
                border: none;
                border-radius: 4px;
                display: block;
            }
            #btn-unlock:hover {
                background: #a93226;
            }
            #mobile-controls {
                display: none;
                justify-content: center;
                margin-top: 12px;
                user-select: none;
                -webkit-user-select: none;
            }
            #mobile-controls.show {
                display: flex;
            }
            .dpad {
                display: grid;
                grid-template-areas:
                    ". up ."
                    "left . right"
                    ". down .";
                gap: 4px;
            }
            .dpad-btn {
                width: 56px;
                height: 56px;
                font-size: 24px;
                border: none;
                border-radius: 8px;
                background: #4a90d9;
                color: #fff;
                cursor: pointer;
                touch-action: manipulation;
            }
            .dpad-btn:active {
                background: #2563a0;
            }
            #btn-up    { grid-area: up; }
            #btn-down  { grid-area: down; }
            #btn-left  { grid-area: left; }
            #btn-right { grid-area: right; }
            #toast {
                position: fixed;
                left: 16px;
                bottom: 20px;
                background: rgba(0, 0, 0, 0.82);
                color: #fff;
                padding: 10px 20px;
                border-radius: 6px;
                font-size: 14px;
                opacity: 0;
                transform: translateY(20px);
                transition: all 0.35s ease;
                pointer-events: none;
                z-index: 999;
            }
            #toast.show {
                opacity: 1;
                transform: translateY(0);
            }
            #timer {
                margin-left: 12px;
                margin-bottom: 8px;
                font-size: 22px;
                font-weight: bold;
                color: #eee;
                font-family: monospace;
                background: #222;
                padding: 6px 14px;
                border-radius: 4px;
                display: inline-block;
                min-width: 80px;
                text-align: center;
            }
            #timer.warning {
                color: #ff6b6b;
            }
            .time-btn {
                margin-left: 4px;
                margin-bottom: 8px;
                padding: 4px 10px;
                font-size: 12px;
                cursor: pointer;
                color: #fff;
                border: none;
                border-radius: 4px;
                vertical-align: middle;
            }
            #btn-harder { background: #c0392b; }
            #btn-harder:hover { background: #a93226; }
            #btn-easier { background: #27ae60; }
            #btn-easier:hover { background: #1e8449; }
            #time-change-row {
                display: none;
                margin-left: 12px;
                margin-bottom: 8px;
                align-items: center;
                gap: 4px;
            }
            #time-change-row.show { display: inline-flex; }
            #time-change-input {
                width: 60px;
                padding: 3px 6px;
                font-size: 13px;
                border: 1px solid #555;
                border-radius: 3px;
                background: #333;
                color: #eee;
                text-align: center;
            }
            #btn-time-change {
                padding: 3px 8px;
                font-size: 12px;
                cursor: pointer;
                color: #fff;
                background: #4a90d9;
                border: none;
                border-radius: 3px;
            }
            #btn-time-change:hover { background: #357abd; }
            .time-row {
                margin-left: 12px;
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                gap: 6px;
                flex-wrap: wrap;
            }
            #score {
                margin-left: 12px;
                margin-bottom: 8px;
                font-size: 18px;
                font-weight: bold;
                color: #f1c40f;
                font-family: monospace;
                background: #222;
                padding: 5px 12px;
                border-radius: 4px;
                display: inline-block;
            }
            .ol-btn {
                padding: 8px 20px;
                font-size: 15px;
                color: #fff;
                border: none;
                border-radius: 6px;
                cursor: pointer;
            }
            .ol-btn-retry { background: #e07b3c; }
            .ol-btn-retry:hover { background: #c06830; }
            .ol-btn-next { background: #27ae60; }
            .ol-btn-next:hover { background: #1e8449; }
            .ol-btn-ok { background: #4a90d9; }
            .ol-btn-ok:hover { background: #357abd; }
            .move-ctrl-btn {
                padding: 5px 14px;
                font-size: 13px;
                cursor: pointer;
                color: #fff;
                border: none;
                border-radius: 4px;
                background: #555;
            }
            .move-ctrl-btn:hover { background: #777; }
            .account-add-btn { padding:4px 12px;font-size:12px;cursor:pointer;background:#4a90d9;color:#fff;border:none;border-radius:4px;white-space:nowrap; }
            .account-add-btn:hover { background:#357abd; }
            .account-tab { padding:5px 12px;font-size:13px;cursor:pointer;color:#ccc;background:#222;border:2px solid transparent;border-radius:4px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;user-select:none; }
            .account-tab:hover { background:#333; }
            .account-tab.active { border-color:#4a90d9;color:#fff;background:#2a2a4a; }
            .account-del { padding:0 4px;font-size:14px;cursor:pointer;color:#888;border:none;background:none;line-height:1; }
            .account-del:hover { color:#e74c3c; }
        </style>
    </head>
    <body>
        <div id="account-bar" style="max-width:95vw;margin:0 auto 10px auto;padding:8px 16px;background:#1a1a2e;border:1px solid #333;border-radius:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span style="color:#aaa;font-size:13px;font-weight:bold;">账号:</span>
            <div id="account-tabs" style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;"></div>
            <button id="btn-add-account" class="account-add-btn">+ 添加账号</button>
            <div id="account-input-row" style="display:none;align-items:center;gap:4px;">
                <input id="account-name-input" style="padding:4px 8px;font-size:13px;border:1px solid #555;border-radius:3px;background:#333;color:#eee;width:100px;" placeholder="账号名" maxlength="12">
                <button id="btn-confirm-account" style="padding:4px 10px;font-size:12px;cursor:pointer;background:#27ae60;color:#fff;border:none;border-radius:3px;">确认</button>
                <button id="btn-cancel-account" style="padding:4px 10px;font-size:12px;cursor:pointer;background:#555;color:#ccc;border:none;border-radius:3px;">取消</button>
            </div>
        </div>
        <div id="container">
            <div>
                <button id="btn-path" class="btn">查看路线</button>
                <button id="btn-reset" class="btn">重新生成</button>
                <button id="btn-unlock">解锁所有级别</button>
                <div class="time-row">
                    <div id="timer">∞</div>
                    <button id="btn-harder" class="time-btn">太难了</button>
                    <button id="btn-easier" class="time-btn">简单</button>
                </div>
                <div id="time-change-row">
                    <input id="time-change-input" type="number" placeholder="秒">
                    <button id="btn-time-change">改变</button>
                </div>
                <div style="margin-left:12px;margin-bottom:8px;display:flex;gap:6px;">
                    <button id="btn-undo" class="move-ctrl-btn">撤回</button>
                    <button id="btn-redo" class="move-ctrl-btn">返回</button>
                </div>
                <div><span id="score">0 分</span> <button id="btn-reset-score" style="margin-left:8px;padding:2px 8px;font-size:11px;cursor:pointer;background:#555;color:#ccc;border:none;border-radius:3px;">重置分数</button></div>
                <div class="difficulty-bar">
                    <button id="diff-beginner" class="diff-btn active">入门</button>
                    <button id="diff-easy" class="diff-btn">简单</button>
                    <button id="diff-starter" class="diff-btn">初级</button>
                    <button id="diff-middle" class="diff-btn">中级</button>
                    <button id="diff-advanced" class="diff-btn">高级</button>
                    <button id="diff-normal" class="diff-btn">普通</button>
                    <button id="diff-skilled" class="diff-btn">熟练</button>
                    <button id="diff-hard" class="diff-btn">困难</button>
                    <button id="diff-expert" class="diff-btn">高手</button>
                    <button id="diff-master" class="diff-btn">大师</button>
                    <button id="diff-nightmare" class="diff-btn">噩梦</button>
                    <button id="diff-insane" class="diff-btn">地狱</button>
                    <button id="diff-abyss" class="diff-btn">深渊</button>
                    <button id="diff-purgatory" class="diff-btn">炼狱</button>
                    <button id="diff-myth" class="diff-btn">神话</button>
                    <button id="diff-mega" class="diff-btn">超级</button>
                    <button id="diff-titan" class="diff-btn">泰坦</button>
                    <button id="diff-giant" class="diff-btn">巨人</button>
                    <button id="diff-leviathan" class="diff-btn">利维坦</button>
                    <button id="diff-omega" class="diff-btn">终焉</button>
                    <button id="diff-colossus" class="diff-btn">巨神</button>
                    <button id="diff-god" class="diff-btn">神级</button>
                </div>
            </div>
            <div id="canvas-wrapper">
                <canvas id="canvas"></canvas>
            </div>
            </div>
        </div>
        <div id="toast"></div>
        <div id="mobile-controls">
            <div class="dpad">
                <button id="btn-up" class="dpad-btn">▲</button>
                <button id="btn-left" class="dpad-btn">◄</button>
                <button id="btn-right" class="dpad-btn">►</button>
                <button id="btn-down" class="dpad-btn">▼</button>
            </div>
        </div>
        <script>
            var canvas = document.getElementById("canvas");
            var ctx = canvas.getContext("2d");
            var won = false;
            var showPath = false;
            var shortestPath = [];

            var difficulties = {
                beginner:  { cols: 6,   rows: 4,   cell: 20 },
                easy:      { cols: 10,  rows: 8,   cell: 18 },
                starter:   { cols: 14,  rows: 11,  cell: 16 },
                middle:    { cols: 18,  rows: 15,  cell: 13 },
                advanced:  { cols: 22,  rows: 19,  cell: 11 },
                normal:    { cols: 26,  rows: 22,  cell: 10 },
                skilled:   { cols: 30,  rows: 26,  cell: 9 },
                hard:      { cols: 34,  rows: 29,  cell: 8 },
                expert:    { cols: 38,  rows: 33,  cell: 7 },
                master:    { cols: 42,  rows: 36,  cell: 7 },
                nightmare: { cols: 46,  rows: 40,  cell: 6 },
                insane:    { cols: 50,  rows: 43,  cell: 6 },
                abyss:     { cols: 54,  rows: 46,  cell: 6 },
                purgatory: { cols: 58,  rows: 50,  cell: 5 },
                myth:      { cols: 62,  rows: 53,  cell: 5 },
                mega:      { cols: 70,  rows: 60,  cell: 4 },
                titan:     { cols: 80,  rows: 70,  cell: 3 },
                giant:     { cols: 92,  rows: 82,  cell: 3 },
                leviathan: { cols: 105, rows: 95,  cell: 3 },
                omega:     { cols: 118, rows: 108, cell: 2 },
                colossus:  { cols: 128, rows: 132, cell: 2 },
                god:       { cols: 128, rows: 146, cell: 2 }
            };

            var diffKeys = Object.keys(difficulties);

            // === ACCOUNT MANAGEMENT ===
            var accounts = [];
            var activeAccount = null;

            (function() {
                var raw = localStorage.getItem("maze_accounts");
                if (raw) { try { accounts = JSON.parse(raw); } catch(e) {} }
                var active = localStorage.getItem("maze_active");
                if (active && accounts.some(function(a) { return a.name === active; })) {
                    activeAccount = active;
                }
            })();

            function saveAccounts() {
                localStorage.setItem("maze_accounts", JSON.stringify(accounts));
            }

            function findAccount(name) {
                for (var i = 0; i < accounts.length; i++) {
                    if (accounts[i].name === name) return accounts[i];
                }
                return null;
            }

            function saveToAccount() {
                if (!activeAccount) return;
                var acct = findAccount(activeAccount);
                if (!acct) return;
                acct.score = totalScore;
                acct.unlocked = {};
                for (var k in unlocked) { if (unlocked.hasOwnProperty(k)) acct.unlocked[k] = unlocked[k]; }
                acct.allUnlocked = allUnlocked;
                saveAccounts();
            }

            function loadFromAccount(name) {
                var acct = findAccount(name);
                if (!acct) return;
                saveToAccount();
                activeAccount = name;
                localStorage.setItem("maze_active", name);
                totalScore = acct.score || 0;
                unlocked = acct.unlocked || {};
                unlocked.beginner = true;
                allUnlocked = acct.allUnlocked || false;
                customTime = 0;
                var allDone2 = true;
                for (var d2 = 0; d2 < diffKeys.length; d2++) {
                    if (!unlocked[diffKeys[d2]]) { allDone2 = false; break; }
                }
                if (allDone2) allUnlocked = true;
                updateScoreDisplay();
                updateDifficultyUI();
                updateAccountUI();
                resetGame();
            }

            function createAccount(name) {
                if (accounts.length >= 5) { showToast("最多5个账号"); return; }
                if (accounts.some(function(a) { return a.name === name; })) { showToast("账号名已存在"); return; }
                saveToAccount();
                var isTerrel = (name === "Terrel");
                var initialUnlocked = { beginner: true };
                if (isTerrel) {
                    for (var dk = 0; dk < diffKeys.length; dk++) { initialUnlocked[diffKeys[dk]] = true; }
                }
                accounts.push({ name: name, score: isTerrel ? 2340 : 0, unlocked: initialUnlocked, allUnlocked: isTerrel });
                saveAccounts();
                activeAccount = name;
                localStorage.setItem("maze_active", name);
                totalScore = isTerrel ? 2340 : 0;
                unlocked = initialUnlocked;
                allUnlocked = isTerrel;
                customTime = 0;
                updateScoreDisplay();
                updateDifficultyUI();
                updateAccountUI();
                resetGame();
                showToast("账号 " + name + " 已创建");
            }

            function deleteAccount(name) {
                if (accounts.length <= 1) { showToast("至少保留一个账号"); return; }
                saveToAccount();
                accounts = accounts.filter(function(a) { return a.name !== name; });
                saveAccounts();
                if (activeAccount === name) {
                    activeAccount = accounts[0].name;
                    localStorage.setItem("maze_active", activeAccount);
                    var acct = findAccount(activeAccount);
                    totalScore = acct ? acct.score || 0 : 0;
                    unlocked = acct ? acct.unlocked || {} : {};
                    unlocked.beginner = true;
                    allUnlocked = acct ? acct.allUnlocked || false : false;
                    updateScoreDisplay();
                    updateDifficultyUI();
                    updateAccountUI();
                    resetGame();
                } else {
                    updateAccountUI();
                }
                showToast("账号已删除");
            }

            function updateAccountUI() {
                var tabs = document.getElementById("account-tabs");
                tabs.innerHTML = "";
                for (var i = 0; i < accounts.length; i++) {
                    (function(acct) {
                        var tab = document.createElement("span");
                        tab.className = "account-tab";
                        if (acct.name === activeAccount) tab.classList.add("active");
                        tab.style.cursor = "pointer";
                        tab.addEventListener("click", function() {
                            if (activeAccount === acct.name) return;
                            loadFromAccount(acct.name);
                        });
                        var label = document.createElement("span");
                        label.textContent = acct.name;
                        tab.appendChild(label);
                        var del = document.createElement("button");
                        del.className = "account-del";
                        del.textContent = "\u2715";
                        del.title = "删除账号";
                        del.addEventListener("click", function(e) {
                            e.stopPropagation();
                            deleteAccount(acct.name);
                        });
                        tab.appendChild(del);
                        tabs.appendChild(tab);
                    })(accounts[i]);
                }
                if (accounts.length >= 5) {
                    document.getElementById("btn-add-account").style.display = "none";
                } else {
                    document.getElementById("btn-add-account").style.display = "";
                }
            }

            var unlocked = {};
            var allUnlocked = false;
            var savedUnlocked = null;

            // Load data from active account
            if (activeAccount) {
                var initAcct = findAccount(activeAccount);
                if (initAcct) {
                    totalScore = initAcct.score || 0;
                    unlocked = initAcct.unlocked || {};
                    allUnlocked = initAcct.allUnlocked || false;
                }
            }
            unlocked.beginner = true;
            var allDone = true;
            for (var d = 0; d < diffKeys.length; d++) {
                if (!unlocked[diffKeys[d]]) { allDone = false; break; }
            }
            if (allDone) allUnlocked = true;

            function saveUnlocked() {
                saveToAccount();
            }

            function unlockLevel(name) {
                if (!unlocked[name]) {
                    unlocked[name] = true;
                    saveUnlocked();
                    updateDifficultyUI();
                }
            }

            function unlockAll() {
                savedUnlocked = {};
                for (var k in unlocked) {
                    if (unlocked.hasOwnProperty(k)) savedUnlocked[k] = unlocked[k];
                }
                allUnlocked = true;
                for (var d = 0; d < diffKeys.length; d++) {
                    unlocked[diffKeys[d]] = true;
                }
                saveUnlocked();
                updateDifficultyUI();
                document.getElementById("btn-unlock").textContent = "撤回";
            }

            function undoUnlockAll() {
                allUnlocked = false;
                unlocked = savedUnlocked || {};
                unlocked.beginner = true;
                savedUnlocked = null;
                saveUnlocked();
                updateDifficultyUI();
                document.getElementById("btn-unlock").textContent = "解锁所有级别";
            }

            function isUnlocked(name) {
                return allUnlocked || !!unlocked[name];
            }

            function getNextDiff(name) {
                var idx = diffKeys.indexOf(name);
                if (idx >= 0 && idx < diffKeys.length - 1) {
                    return diffKeys[idx + 1];
                }
                return null;
            }

            function updateDifficultyUI() {
                for (var d = 0; d < diffKeys.length; d++) {
                    var btn = document.getElementById("diff-" + diffKeys[d]);
                    if (isUnlocked(diffKeys[d])) {
                        btn.classList.remove("locked");
                    } else {
                        btn.classList.add("locked");
                    }
                }
            }

            var currentDiff = "beginner";
            var baseCellSize = difficulties[currentDiff].cell;
            var zoom = 1;
            var cellSize = baseCellSize * zoom;
            var mazeCols = difficulties[currentDiff].cols;
            var mazeRows = difficulties[currentDiff].rows;
            var gridRows = 2 * mazeRows + 1;
            var gridCols = 2 * mazeCols + 1;

            function applyZoom() {
                var wrapper = document.getElementById("canvas-wrapper");
                var playerPX = x * cellSize + cellSize / 2;
                var playerPY = y * cellSize + cellSize / 2;
                var viewX = playerPX - wrapper.scrollLeft;
                var viewY = playerPY - wrapper.scrollTop;
                cellSize = Math.max(1, Math.floor(baseCellSize * zoom));
                canvas.width = gridCols * cellSize;
                canvas.height = gridRows * cellSize;
                draw();
                var newPX = x * cellSize + cellSize / 2;
                var newPY = y * cellSize + cellSize / 2;
                wrapper.scrollLeft = newPX - viewX;
                wrapper.scrollTop = newPY - viewY;
            }

            canvas.width = gridCols * cellSize;
            canvas.height = gridRows * cellSize;

            var startX = 1, startY = 0;
            var goalX = gridCols - 2, goalY = gridRows - 1;

            var x = startX;
            var y = startY;

            function generateMaze() {
                var maze = [];
                for (var r = 0; r < gridRows; r++) {
                    maze[r] = [];
                    for (var c = 0; c < gridCols; c++) {
                        maze[r][c] = "#";
                    }
                }

                var unvisited = [];
                for (var r = 1; r < gridRows - 1; r += 2) {
                    for (var c = 1; c < gridCols - 1; c += 2) {
                        unvisited.push([r, c]);
                    }
                }

                function shuffle(arr) {
                    for (var i = arr.length - 1; i > 0; i--) {
                        var j = Math.floor(Math.random() * (i + 1));
                        var tmp = arr[i];
                        arr[i] = arr[j];
                        arr[j] = tmp;
                    }
                }

                shuffle(unvisited);
                var first = unvisited.pop();
                maze[first[0]][first[1]] = " ";

                var dirs = [[-2, 0], [0, 2], [2, 0], [0, -2]];
                var midDirs = [[-1, 0], [0, 1], [1, 0], [0, -1]];

                for (var u = unvisited.length - 1; u >= 0; u--) {
                    var cr = unvisited[u][0];
                    var cc = unvisited[u][1];
                    if (maze[cr][cc] == " ") continue;

                    var walk = [[cr, cc]];
                    var wr = cr, wc = cc;
                    while (true) {
                        var di = Math.floor(Math.random() * 4);
                        var nr = wr + dirs[di][0];
                        var nc = wc + dirs[di][1];
                        if (nr <= 0 || nr >= gridRows - 1 || nc <= 0 || nc >= gridCols - 1) continue;

                        var found = -1;
                        for (var k = 0; k < walk.length; k++) {
                            if (walk[k][0] === nr && walk[k][1] === nc) { found = k; break; }
                        }

                        if (found >= 0) {
                            walk = walk.slice(0, found + 1);
                            wr = nr;
                            wc = nc;
                        } else if (maze[nr][nc] == " ") {
                            walk.push([nr, nc]);
                            break;
                        } else {
                            walk.push([nr, nc]);
                            wr = nr;
                            wc = nc;
                        }
                    }

                    for (var i = 0; i < walk.length; i++) {
                        var wr = walk[i][0];
                        var wc = walk[i][1];
                        maze[wr][wc] = " ";
                    }
                    for (var i = 0; i < walk.length - 1; i++) {
                        var mr = (walk[i][0] + walk[i + 1][0]) / 2;
                        var mc = (walk[i][1] + walk[i + 1][1]) / 2;
                        maze[mr][mc] = " ";
                    }
                }

                maze[0][startX] = " ";
                maze[gridRows - 1][goalX] = " ";

                return maze;
            }

            var map = generateMaze();

            function findShortestPath() {
                var moves = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                var visited = [];
                var parent = [];
                for (var r = 0; r < gridRows; r++) {
                    visited[r] = [];
                    parent[r] = [];
                    for (var c = 0; c < gridCols; c++) {
                        visited[r][c] = false;
                        parent[r][c] = null;
                    }
                }

                var queue = [[startX, 0]];
                visited[0][startX] = true;

                while (queue.length > 0) {
                    var cur = queue.shift();
                    var cr = cur[1], cc = cur[0];

                    if (cr === goalY && cc === goalX) {
                        var path = [];
                        var pr = cr, pc = cc;
                        while (pr !== null) {
                            path.push([pc, pr]);
                            var pp = parent[pr][pc];
                            if (pp === null) break;
                            pc = pp[0];
                            pr = pp[1];
                        }
                        path.reverse();
                        return path;
                    }

                    for (var i = 0; i < 4; i++) {
                        var nr = cr + moves[i][0];
                        var nc = cc + moves[i][1];
                        if (nr >= 0 && nr < gridRows && nc >= 0 && nc < gridCols
                            && map[nr][nc] != "#" && !visited[nr][nc]) {
                            visited[nr][nc] = true;
                            parent[nr][nc] = [cc, cr];
                            queue.push([nc, nr]);
                        }
                    }
                }

                return [];
            }

            function draw() {
                for (var i = 0; i < map.length; i++) {
                    for (var j = 0; j < map[i].length; j++) {
                        if (map[i][j] == "#") {
                            ctx.fillStyle = "black";
                        } else {
                            ctx.fillStyle = "white";
                        }
                        ctx.fillRect(j * cellSize, i * cellSize, cellSize, cellSize);
                    }
                }
                if (showPath) {
                    var ps = cellSize * 0.4;
                    var po = (cellSize - ps) / 2;
                    for (var k = 0; k < shortestPath.length; k++) {
                        var px = shortestPath[k][0];
                        var py = shortestPath[k][1];
                        ctx.fillStyle = "rgba(70, 180, 255, 0.7)";
                        ctx.fillRect(px * cellSize + po, py * cellSize + po, ps, ps);
                    }
                }
                ctx.fillStyle = "red";
                ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                ctx.fillStyle = "rgba(0, 200, 0, 0.5)";
                ctx.fillRect(goalX * cellSize, goalY * cellSize, cellSize, cellSize);
            }

            function resetGame() {
                clearInterval(moveTimer);
                moveTimer = null;
                stopCountdown();
                keys = {};
                won = false;
                x = startX;
                y = startY;
                showPath = false;
                shortestPath = [];
                usedPathHint = false;
                usedHarder = false;
                actionHistory = [];
                redoStack = [];
                timeLimit = getTimeLimit();
                timeLeft = timeLimit;
                updateTimerDisplay();
                document.getElementById("btn-path").textContent = "查看路线";
                map = generateMaze();
                draw();
            }

            function changeDifficulty(diff) {
                if (currentDiff === diff) return;
                if (!isUnlocked(diff)) return;
                customTime = 0;
                currentDiff = diff;
                baseCellSize = difficulties[diff].cell;
                zoom = 1;
                cellSize = baseCellSize;
                mazeCols = difficulties[diff].cols;
                mazeRows = difficulties[diff].rows;
                gridRows = 2 * mazeRows + 1;
                gridCols = 2 * mazeCols + 1;
                canvas.width = gridCols * cellSize;
                canvas.height = gridRows * cellSize;
                startX = 1;
                startY = 0;
                goalX = gridCols - 2;
                goalY = gridRows - 1;
                document.querySelectorAll(".diff-btn").forEach(function(b) {
                    b.classList.remove("active");
                });
                document.getElementById("diff-" + diff).classList.add("active");
                resetGame();
            }

            document.getElementById("btn-reset").addEventListener("click", function() {
                resetGame();
            });

            for (var d = 0; d < diffKeys.length; d++) {
                (function(diff) {
                    document.getElementById("diff-" + diff).addEventListener("click", function() {
                        changeDifficulty(diff);
                    });
                })(diffKeys[d]);
            }

            document.getElementById("btn-unlock").addEventListener("click", function() {
                if (allUnlocked) {
                    undoUnlockAll();
                } else {
                    unlockAll();
                }
            });

            document.getElementById("btn-path").addEventListener("click", function() {
                showPath = !showPath;
                if (showPath) {
                    usedPathHint = true;
                    shortestPath = findShortestPath();
                    this.textContent = "隐藏路线";
                } else {
                    shortestPath = [];
                    this.textContent = "查看路线";
                }
                draw();
            });

            var keys = {};
            var moveTimer = null;
            var curSpeed = 40;
            var toastTimer = null;

            function showToast(msg) {
                var t = document.getElementById("toast");
                t.textContent = msg;
                t.classList.add("show");
                if (toastTimer) clearTimeout(toastTimer);
                toastTimer = setTimeout(function() {
                    t.classList.remove("show");
                }, 2500);
            }

            var timeLimit = 0;
            var timeLeft = 0;
            var countdownTimer = null;
            var customTime = 0; // 0 means use formula
            var changeMode = null; // "harder" or "easier"

            if (typeof totalScore === 'undefined') var totalScore = 0;
            var usedPathHint = false;
            var usedHarder = false;
            var actionHistory = [];
            var redoStack = [];

            (function() {
                updateScoreDisplay();
                updateAccountUI();
            })();

            function updateScoreDisplay() {
                document.getElementById("score").textContent = totalScore + " 分";
            }

            function saveScore() {
                saveToAccount();
                updateScoreDisplay();
            }

            function addScore(pts) {
                totalScore = Math.max(0, totalScore + pts);
                saveScore();
            }

            document.getElementById("btn-reset-score").addEventListener("click", function() {
                var prevScore = totalScore;
                totalScore = 0;
                saveScore();
                actionHistory.push({type: "resetScore", prevScore: prevScore});
                redoStack = [];
                showToast("分数已重置");
            });

            function doUndo() {
                if (won || actionHistory.length === 0) return;
                var action = actionHistory.pop();
                if (action.type === "move") {
                    redoStack.push({type: "move", from: {x: x, y: y}, to: action.to});
                    x = action.from.x;
                    y = action.from.y;
                    draw();
                } else if (action.type === "resetScore") {
                    redoStack.push({type: "resetScore", prevScore: totalScore});
                    totalScore = action.prevScore;
                    saveScore();
                }
            }

            function doRedo() {
                if (won || redoStack.length === 0) return;
                var action = redoStack.pop();
                if (action.type === "move") {
                    actionHistory.push({type: "move", from: {x: x, y: y}, to: action.to});
                    x = action.to.x;
                    y = action.to.y;
                    draw();
                } else if (action.type === "resetScore") {
                    actionHistory.push({type: "resetScore", prevScore: totalScore});
                    totalScore = action.prevScore;
                    saveScore();
                }
            }

            document.getElementById("btn-undo").addEventListener("click", doUndo);
            document.getElementById("btn-redo").addEventListener("click", doRedo);

            function getOrigTime() {
                return Math.max(45, Math.ceil(Math.sqrt(mazeCols * mazeRows) * 8));
            }

            function calcDifficultyScore() {
                var idx = diffKeys.indexOf(currentDiff);
                return (idx + 1) * 10;
            }

            function showOverlay(msg, scoreText, nextDiff) {
                var overlay = document.getElementById("overlay");
                if (!overlay) {
                    overlay = document.createElement("div");
                    overlay.id = "overlay";
                    overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;";
                    overlay.addEventListener("click", function(e) {
                        if (e.target === overlay) {
                            overlay.style.display = "none";
                        }
                    });
                    document.body.appendChild(overlay);
                }
                var inner = document.createElement("div");
                inner.style.cssText = "background:#1a1a2e;color:#eee;padding:30px 40px;border-radius:12px;text-align:center;font-size:18px;max-width:360px;";
                var buttonsHtml = "<div style='margin-top:12px;display:flex;gap:8px;justify-content:center;'>"
                    + "<button class='ol-btn ol-btn-retry'>重来</button>"
                    + (nextDiff ? "<button class='ol-btn ol-btn-next'>下一关</button>" : "")
                    + "<button class='ol-btn ol-btn-ok'>确定</button>"
                    + "</div>";
                inner.innerHTML = "<div style='font-size:28px;font-weight:bold;margin-bottom:12px;'>" + msg + "</div>"
                    + (scoreText ? "<div style='color:#f1c40f;margin-bottom:8px;'>" + scoreText + "</div>" : "")
                    + "<div style='margin-bottom:6px;color:#aaa;'>总分: " + totalScore + " 分</div>"
                    + buttonsHtml;
                overlay.innerHTML = "";
                overlay.appendChild(inner);
                overlay.style.display = "flex";
                inner.querySelector(".ol-btn-retry").addEventListener("click", function() {
                    overlay.style.display = "none";
                    resetGame();
                });
                if (nextDiff) {
                    inner.querySelector(".ol-btn-next").addEventListener("click", function() {
                        overlay.style.display = "none";
                        changeDifficulty(nextDiff);
                        resetGame();
                    });
                }
                inner.querySelector(".ol-btn-ok").addEventListener("click", function() {
                    overlay.style.display = "none";
                });
            }

            function getTimeLimit() {
                return customTime > 0 ? customTime : Math.max(45, Math.ceil(Math.sqrt(mazeCols * mazeRows) * 8));
            }

            function formatTime(sec) {
                var m = Math.floor(sec / 60);
                var s = sec % 60;
                return m + ":" + (s < 10 ? "0" : "") + s;
            }

            function updateTimerDisplay() {
                var el = document.getElementById("timer");
                el.textContent = formatTime(timeLeft);
                if (timeLeft <= 15) {
                    el.classList.add("warning");
                } else {
                    el.classList.remove("warning");
                }
            }

            function stopCountdown() {
                if (countdownTimer) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                }
                document.getElementById("timer").style.borderLeft = "3px solid transparent";
            }

            function startCountdown() {
                if (countdownTimer) return;
                if (timeLeft <= 0) return;
                var el = document.getElementById("timer");
                el.style.borderLeft = "3px solid #4a90d9";
                function tick() {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) {
                        stopCountdown();
                        clearInterval(moveTimer);
                        moveTimer = null;
                        won = true;
                        draw();
                        addScore(-10);
                        showOverlay("You Lose!", "-10 分");
                    }
                }
                countdownTimer = setInterval(tick, 1000);
            }

            function countPaths(px, py) {
                var count = 0;
                if (map[py - 1] && map[py - 1][px] && map[py - 1][px] != "#") count++;
                if (map[py + 1] && map[py + 1][px] && map[py + 1][px] != "#") count++;
                if (map[py] && map[py][px - 1] && map[py][px - 1] != "#") count++;
                if (map[py] && map[py][px + 1] && map[py][px + 1] != "#") count++;
                return count;
            }

            function restartTimer() {
                if (moveTimer) clearInterval(moveTimer);
                var paths = countPaths(x, y);
                var newSpeed = paths >= 3 ? 150 : 40;
                if (newSpeed !== curSpeed) {
                    curSpeed = newSpeed;
                }
                moveTimer = setInterval(doMove, curSpeed);
            }

            function doMove() {
                if (won) return;
                var nx = x, ny = y;
                if (keys[37] || keys[65]) nx--;
                else if (keys[39] || keys[68]) nx++;
                else if (keys[38] || keys[87]) ny--;
                else if (keys[40] || keys[83]) ny++;
                else return;

                if (map[ny] && map[ny][nx] && map[ny][nx] != "#") {
                    actionHistory.push({type: "move", from: {x: x, y: y}, to: {x: nx, y: ny}});
                    redoStack = [];
                    x = nx;
                    y = ny;
                    restartTimer();
                }
                if (x == goalX && y == goalY) {
                    won = true;
                    clearInterval(moveTimer);
                    moveTimer = null;
                    stopCountdown();
                    var next = getNextDiff(currentDiff);
                    var msg = "You Win!";
                    var scoreText = "";
                    if (!usedPathHint && !usedHarder) {
                        var pts = calcDifficultyScore();
                        if (customTime > 0 && customTime < getOrigTime()) {
                            pts *= 2;
                        }
                        addScore(pts);
                        scoreText = "+" + pts + " 分";
                    }
                    if (next && !isUnlocked(next)) {
                        unlockLevel(next);
                        showOverlay(msg, scoreText + (scoreText ? " | " : "") + "已解锁: " + document.getElementById("diff-" + next).textContent, next);
                    } else {
                        showOverlay(msg, scoreText, next);
                    }
                }
                draw();
            }

            document.addEventListener("keydown", function(e) {
                if (won) return;
                // Ctrl+Z = undo, Ctrl+Y = redo
                if (e.ctrlKey && e.keyCode === 90) { e.preventDefault(); doUndo(); return; }
                if (e.ctrlKey && e.keyCode === 89) { e.preventDefault(); doRedo(); return; }
                var kc = e.keyCode;
                if (kc == 37 || kc == 38 || kc == 39 || kc == 40
                    || kc == 65 || kc == 87 || kc == 68 || kc == 83) {
                    e.preventDefault();
                    startCountdown();
                    keys[e.keyCode] = true;
                    if (!moveTimer) {
                        curSpeed = countPaths(x, y) >= 3 ? 150 : 40;
                        moveTimer = setInterval(doMove, curSpeed);
                        doMove();
                    }
                }
            });

            document.addEventListener("keyup", function(e) {
                keys[e.keyCode] = false;
                var active = keys[37] || keys[38] || keys[39] || keys[40]
                    || keys[65] || keys[87] || keys[68] || keys[83];
                if (!active) {
                    clearInterval(moveTimer);
                    moveTimer = null;
                }
            });

            var isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)
                || ('ontouchstart' in window && window.innerWidth < 768);
            if (isMobile) {
                document.getElementById("mobile-controls").classList.add("show");
            }

            function bindMobileBtn(id, keyCode) {
                var btn = document.getElementById(id);
                if (!btn) return;
                btn.addEventListener("touchstart", function(e) {
                    e.preventDefault();
                    if (won) return;
                    startCountdown();
                    keys[keyCode] = true;
                    if (!moveTimer) {
                        curSpeed = countPaths(x, y) >= 3 ? 150 : 40;
                        moveTimer = setInterval(doMove, curSpeed);
                        doMove();
                    }
                });
                btn.addEventListener("touchend", function(e) {
                    e.preventDefault();
                    keys[keyCode] = false;
                    var active = keys[37] || keys[38] || keys[39] || keys[40]
                        || keys[65] || keys[87] || keys[68] || keys[83];
                    if (!active) {
                        clearInterval(moveTimer);
                        moveTimer = null;
                    }
                });
                btn.addEventListener("mousedown", function(e) {
                    e.preventDefault();
                    if (won) return;
                    startCountdown();
                    keys[keyCode] = true;
                    if (!moveTimer) {
                        curSpeed = countPaths(x, y) >= 3 ? 150 : 40;
                        moveTimer = setInterval(doMove, curSpeed);
                        doMove();
                    }
                });
                btn.addEventListener("mouseup", function(e) {
                    e.preventDefault();
                    keys[keyCode] = false;
                    var active = keys[37] || keys[38] || keys[39] || keys[40]
                        || keys[65] || keys[87] || keys[68] || keys[83];
                    if (!active) {
                        clearInterval(moveTimer);
                        moveTimer = null;
                    }
                });
            }

            bindMobileBtn("btn-up", 38);
            bindMobileBtn("btn-down", 40);
            bindMobileBtn("btn-left", 37);
            bindMobileBtn("btn-right", 39);

            canvas.addEventListener("wheel", function(e) {
                e.preventDefault();
                if (e.deltaY < 0) {
                    zoom = Math.min(5, zoom * 1.2);
                } else {
                    zoom = Math.max(0.2, zoom / 1.2);
                }
                applyZoom();
            }, { passive: false });

            function showTimeChange(mode) {
                var defaultTime = getTimeLimit();
                changeMode = mode;
                document.getElementById("time-change-input").value = defaultTime;
                document.getElementById("time-change-row").classList.add("show");
                document.getElementById("time-change-input").focus();
            }

            document.getElementById("btn-harder").addEventListener("click", function() {
                showTimeChange("harder");
            });

            document.getElementById("btn-easier").addEventListener("click", function() {
                showTimeChange("easier");
            });

            document.getElementById("btn-time-change").addEventListener("click", function() {
                var val = parseInt(document.getElementById("time-change-input").value, 10);
                if (isNaN(val) || val <= 0) {
                    showToast("Invalid time!");
                    return;
                }
                var origTime = Math.max(45, Math.ceil(Math.sqrt(mazeCols * mazeRows) * 8));
                if (changeMode === "harder" && val <= origTime) {
                    showToast("Invalid time!");
                    return;
                }
                if (changeMode === "easier" && val >= origTime) {
                    showToast("Invalid time!");
                    return;
                }
                customTime = val;
                timeLimit = val;
                timeLeft = val;
                if (changeMode === "harder") usedHarder = true;
                stopCountdown();
                updateTimerDisplay();
                document.getElementById("time-change-row").classList.remove("show");
                showToast("时间已更改！");
                resetGame();
            });

            // Account button handlers
            document.getElementById("btn-add-account").addEventListener("click", function() {
                document.getElementById("account-input-row").style.display = "inline-flex";
                document.getElementById("account-name-input").value = "";
                document.getElementById("account-name-input").focus();
            });

            document.getElementById("btn-confirm-account").addEventListener("click", function() {
                var name = document.getElementById("account-name-input").value.trim();
                if (!name) { showToast("请输入账号名"); return; }
                document.getElementById("account-input-row").style.display = "none";
                createAccount(name);
            });

            document.getElementById("btn-cancel-account").addEventListener("click", function() {
                document.getElementById("account-input-row").style.display = "none";
            });

            document.getElementById("account-name-input").addEventListener("keydown", function(e) {
                if (e.keyCode === 13) {
                    document.getElementById("btn-confirm-account").click();
                }
            });

            window.addEventListener("beforeunload", function() {
                saveToAccount();
            });

            updateDifficultyUI();
            timeLimit = getTimeLimit();
            timeLeft = timeLimit;
            updateTimerDisplay();
            draw();
        </script>
    </body>
</html>
